services:
  postgres-test:
    image: postgres:16-alpine
    container_name: patisserie_postgres_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: patisserie_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: patisserie_redis_test
    ports:
      - "6380:6379"
    tmpfs:
      - /data

  minio-test:
    image: minio/minio:latest
    container_name: patisserie_minio_test
    ports:
      - "9002:9000"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    tmpfs:
      - /data
    command: server /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 3

  minio-test-setup:
    image: minio/mc:latest
    container_name: patisserie_minio_test_setup
    depends_on:
      minio-test:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio-test:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing local/patisserie-private-test;
      /usr/bin/mc mb --ignore-existing local/patisserie-public-test;
      /usr/bin/mc anonymous set public local/patisserie-public-test;
      echo 'Test buckets ready';
      "
